<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusFeed // Global Live Stream</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="customAlert" class="custom-alert">
    <div class="alert-content">
      <span id="alertIcon">⚡</span>
      <p id="alertMessage">System Online</p>
    </div>
  </div>

  <div class="main-app-page">
    <header class="app-header">
      <div class="user-profile">
        <div class="avatar" id="userAvatar">??</div>
        <div>
          <h4 id="displayUser">Developer Portal</h4>
          <span class="status-dot">Online Stream</span>
        </div>
      </div>
      <a href="login.html" class="logout-btn" style="text-decoration: none; font-size: 0.85rem;">Logout</a>
    </header>

    <div class="create-post-box">
      <form id="postForm">
        <input type="text" id="postTitle" placeholder="Post Title..." required>
        <textarea id="postContent" placeholder="What's on your mind?..." rows="3" required></textarea>
        <button type="submit" id="submitBtn">Publish Post</button>
      </form>
    </div>

    <div class="feed-section">
      <h3>Global Live Stream</h3>
      <div id="postsWrapper">
        <div id="emptyMessage" class="empty-feed">The feed is empty. Be the first to broadcast!</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
